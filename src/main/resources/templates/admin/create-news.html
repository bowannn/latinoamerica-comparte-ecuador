<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Ecuador Comparte - Nueva Noticia</title>
    <link rel="icon" type="image/png" th:href="@{/Ecuador_Co_N.png}" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Work+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link th:href="@{/index.css}" rel="stylesheet"/>
    <style>
        body { background-color: var(--color-background); font-family: var(--font-body); min-height: 100vh; }
        .form-container { padding-top: 8rem; padding-bottom: 5rem; max-width: 720px; margin: 0 auto; }
        .card-form { background: var(--color-surface-container-lowest); border-radius: 1.5rem; padding: 2.5rem; border: 1px solid var(--color-outline-variant); box-shadow: 0 10px 30px rgba(0,0,0,0.04); }
        .form-group { margin-bottom: 1.5rem; display: flex; flex-direction: column; gap: 0.5rem; }
        .form-group label { font-family: var(--font-headline); font-weight: 700; color: var(--color-on-surface); font-size: 0.95rem; }
        .form-control { padding: 0.75rem 1rem; border-radius: 0.5rem; border: 1px solid var(--color-outline-variant); font-family: var(--font-body); font-size: 1rem; background: var(--color-surface); color: var(--color-on-surface); width: 100%; box-sizing: border-box; transition: border-color 0.2s; }
        .form-control:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 3px rgba(120,85,0,0.1); }
        textarea.form-control { resize: vertical; }
        .btn-group { display: flex; gap: 1rem; margin-top: 2rem; }
        .btn-cancel { background: #fce8e6; color: var(--color-error); padding: 0.75rem 1.5rem; border-radius: 0.5rem; text-decoration: none; font-weight: 600; text-align: center; flex: 1; }
        .btn-submit { background: var(--color-primary); color: var(--color-on-primary); padding: 0.75rem 1.5rem; border-radius: 0.5rem; border: none; font-weight: 600; cursor: pointer; flex: 1; font-size: 1rem; }
        .btn-submit:hover { opacity: 0.9; }
        .hint { font-size: 0.82rem; color: var(--color-outline); margin-top: 0.25rem; }
        select.form-control { cursor: pointer; }
    </style>
</head>
<body class="textile-pattern">

<nav class="navbar">
    <div class="navbar__inner main-wrapper">
        <div class="navbar__logo"><img th:src="@{/Ecuador_Co_N.png}" alt="Ecuador Comparte" /></div>
        <div class="navbar__links">
            <a class="navbar__link" th:href="@{/admin}">← Volver al Dashboard</a>
        </div>
        <div class="navbar__actions"></div>
    </div>
</nav>

<main class="main-wrapper form-container">
    <div class="card-form">
        <span class="section-label" style="color: var(--color-primary);">Panel de Administración</span>
        <h2 style="font-family: var(--font-headline); margin-bottom: 0.5rem;">Nueva Noticia</h2>
        <p style="color: var(--color-on-surface-variant); margin-bottom: 2rem; font-size: 0.9rem;">
            Complete los campos para publicar una nueva noticia. Los campos marcados con <strong>*</strong> son obligatorios.
        </p>

        <form th:action="@{/admin/noticias/crear}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-group">
                <label for="title">Título <strong>*</strong></label>
                <input type="text" id="title" name="title" class="form-control" required
                       placeholder="Título de la noticia..."/>
            </div>

            <div class="form-group">
                <label for="summary">Resumen <strong>*</strong></label>
                <input type="text" id="summary" name="summary" class="form-control" required
                       placeholder="Breve descripción de la noticia..."/>
                <span class="hint">Se muestra en las tarjetas de vista previa (máx. recomendado: 180 caracteres).</span>
            </div>

            <div class="form-group">
                <label for="content">Contenido <strong>*</strong></label>
                <textarea id="content" name="content" class="form-control" rows="8" required
                          placeholder="Escribe aquí el contenido completo de la noticia..."></textarea>
            </div>

            <div class="form-group">
                <label for="imageUrl">URL de Imagen <span style="font-weight:400;color:var(--color-outline);">(opcional)</span></label>
                <input type="url" id="imageUrl" name="imageUrl" class="form-control"
                       placeholder="https://ejemplo.com/imagen.jpg"/>
                <span class="hint">Enlace a la imagen principal de la noticia.</span>
            </div>

            <div class="form-group">
                <label for="status">Estado de publicación <strong>*</strong></label>
                <select id="status" name="status" class="form-control">
                    <option value="STATUS_DRAFT">Borrador (no visible en el sitio)</option>
                    <option value="STATUS_PUBLISHED">Publicado (visible en el sitio)</option>
                </select>
            </div>

            <div class="btn-group">
                <a th:href="@{/admin}" class="btn-cancel">Cancelar</a>
                <button type="submit" class="btn-submit">
                    <span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle;margin-right:4px;">save</span>
                    Crear Noticia
                </button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
