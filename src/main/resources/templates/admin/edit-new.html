<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Ecuador Comparte - Editar Noticia</title>
    <link rel="icon" type="image/png" th:href="@{/Ecuador_Co_N.png}" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Work+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>
    <link th:href="@{/index.css}" rel="stylesheet"/>
    <style>
        body { background-color: var(--color-background); font-family: var(--font-body); }
        .form-container { padding-top: 8rem; padding-bottom: 5rem; max-width: 600px; margin: 0 auto; }
        .card-form { background: var(--color-surface-container-lowest); border-radius: 1.5rem; padding: 2.5rem; border: 1px solid var(--color-outline-variant); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.02); }
        .form-group { margin-bottom: 1.5rem; display: flex; flex-direction: column; gap: 0.5rem; }
        .form-group label { font-family: var(--font-headline); font-weight: 700; color: var(--color-on-surface); }
        .form-control { padding: 0.75rem 1rem; border-radius: 0.5rem; border: 1px solid var(--color-outline-variant); font-family: var(--font-body); font-size: 1rem; background: var(--color-surface); color: var(--color-on-surface); }
        .btn-group { display: flex; gap: 1rem; margin-top: 2rem; }
        .btn-cancel { background: #fce8e6; color: var(--color-error); padding: 0.75rem 1.5rem; border-radius: 0.5rem; text-decoration: none; font-weight: 600; text-align: center; flex: 1; }
        .btn-submit { background: var(--color-primary); color: var(--color-on-primary); padding: 0.75rem 1.5rem; border-radius: 0.5rem; border: none; font-weight: 600; cursor: pointer; flex: 1; }
    </style>
</head>
<body class="textile-pattern">

<nav class="navbar">
    <div class="navbar__inner">
        <div class="navbar__logo"><img th:src="@{/Ecuador_Co_N.png}" alt="Ecuador Comparte" /></div>
        <div class="navbar__links">
            <a class="navbar__link" th:href="@{/admin}">Volver al Dashboard</a>
        </div>
    </div>
</nav>

<main class="main-wrapper form-container">
    <div class="card-form">
        <span class="section-label" style="color: var(--color-primary);">Editor de Persistencia</span>
        <h2 style="font-family: var(--font-headline); margin-bottom: 2rem;">Modificar Noticia</h2>

        <form th:action="@{/admin/noticias/guardar}" th:object="${noticia}" method="post">
            <input type="hidden" th:field="*{id}" />
            <input type="hidden" th:field="*{publishedAt}" />

            <div class="form-group">
                <label for="title">Título de la Noticia</label>
                <input type="text" id="title" th:field="*{title}" class="form-control" required />
            </div>

            <div class="form-group">
                <label for="summary">Resumen Breve</label>
                <input type="text" id="summary" th:field="*{summary}" class="form-control" required />
            </div>

            <div class="form-group">
                <label for="content">Contenido Completo</label>
                <textarea id="content" th:field="*{content}" class="form-control" rows="6" required></textarea>
            </div>

            <div class="form-group">
                <label for="status">Estado en Sistema</label>
                <select id="status" th:field="*{status}" class="form-control">
                    <option value="ACTIVE">ACTIVE</option>
                    <option value="INACTIVE">INACTIVE</option>
                </select>
            </div>

            <div class="btn-group">
                <a th:href="@{/admin}" class="btn-cancel">Cancelar</a>
                <button type="submit" class="btn-submit">Guardar Cambios</button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
