<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Ecuador Comparte - Editar Noticia</title>
    <link rel="icon" type="image/png" th:href="@{/Ecuador_Co_N.png}" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Work+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link th:href="@{/index.css}" rel="stylesheet"/>
    <style>
        body { background-color: var(--color-background); font-family: var(--font-body); min-height: 100vh; }
        .form-container { padding-top: 8rem; padding-bottom: 5rem; max-width: 640px; margin: 0 auto; }
        .card-form { background: var(--color-surface-container-lowest); border-radius: 1.5rem; padding: 2.5rem; border: 1px solid var(--color-outline-variant); box-shadow: 0 10px 30px rgba(0,0,0,0.04); }
        .form-group { margin-bottom: 1.5rem; display: flex; flex-direction: column; gap: 0.5rem; }
        .form-group label { font-family: var(--font-headline); font-weight: 700; color: var(--color-on-surface); font-size: 0.95rem; }
        .form-control { padding: 0.75rem 1rem; border-radius: 0.5rem; border: 1px solid var(--color-outline-variant); font-family: var(--font-body); font-size: 1rem; background: var(--color-surface); color: var(--color-on-surface); width: 100%; box-sizing: border-box; }
        textarea.form-control { resize: vertical; }
        .btn-group { display: flex; gap: 1rem; margin-top: 2rem; }
        .btn-cancel { background: #fce8e6; color: var(--color-error); padding: 0.75rem 1.5rem; border-radius: 0.5rem; text-decoration: none; font-weight: 600; text-align: center; flex: 1; }
        .btn-submit { background: var(--color-primary); color: var(--color-on-primary); padding: 0.75rem 1.5rem; border-radius: 0.5rem; border: none; font-weight: 600; cursor: pointer; flex: 1; font-size: 1rem; }
    </style>
</head>
<body class="textile-pattern">

<nav class="navbar">
    <div class="navbar__inner">
        <div class="navbar__logo"><img th:src="@{/Ecuador_Co_N.png}" alt="Ecuador Comparte" /></div>
        <div class="navbar__links">
            <a class="navbar__link" th:href="@{/admin}">← Volver al Dashboard</a>
        </div>
    </div>
</nav>

<main class="main-wrapper form-container">
    <div class="card-form">
        <span class="section-label" style="color: var(--color-primary);">Panel de Administración</span>
        <h2 style="font-family: var(--font-headline); margin-bottom: 0.5rem;">Editar Noticia</h2>
        <p style="color: var(--color-on-surface-variant); margin-bottom: 2rem; font-size: 0.9rem;">
            ID: <strong th:text="${noticia.id}"></strong> &nbsp;·&nbsp;
            Publicada: <span th:text="${noticia.publishedAt != null ? #temporals.format(noticia.publishedAt, 'dd/MM/yyyy HH:mm') : 'N/A'}"></span>
        </p>

        <form th:action="@{/admin/noticias/guardar}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" name="id" th:value="${noticia.id}"/>

            <div class="form-group">
                <label for="title">Título de la Noticia</label>
                <input type="text" id="title" name="title" th:value="${noticia.title}" class="form-control" required/>
            </div>

            <div class="form-group">
                <label for="summary">Resumen Breve</label>
                <input type="text" id="summary" name="summary" th:value="${noticia.summary}" class="form-control" required/>
            </div>

            <div class="form-group">
                <label for="content">Contenido Completo</label>
                <textarea id="content" name="content" th:text="${noticia.content}" class="form-control" rows="8" required></textarea>
            </div>

            <div class="form-group">
                <label for="status">Estado</label>
                <select id="status" name="status" class="form-control">
                    <option value="STATUS_DRAFT"
                            th:selected="${noticia.status == null or noticia.status.name() == 'STATUS_DRAFT'}">
                        Borrador
                    </option>
                    <option value="STATUS_PUBLISHED"
                            th:selected="${noticia.status != null and noticia.status.name() == 'STATUS_PUBLISHED'}">
                        Publicado
                    </option>
                </select>
            </div>

            <div class="btn-group">
                <a th:href="@{/admin}" class="btn-cancel">Cancelar</a>
                <button type="submit" class="btn-submit">Guardar Cambios</button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
